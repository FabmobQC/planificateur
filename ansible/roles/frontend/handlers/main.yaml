- name: Install otp-ui's dependencies
  ansible.builtin.command: pnpm install
  args:
    chdir: "{{ frontend_otp_ui_folder }}"
  changed_when: true

- name: Compile otp-ui # noqa: no-changed-when
  ansible.builtin.command: "pnpm prepublish"
  args:
    chdir: "{{ frontend_otp_ui_folder }}"
  notify:
    - Pack otp-ui

- name: Pack otp-ui # noqa: no-changed-when
  ansible.builtin.command: "pnpm pack"
  args:
    chdir: "{{ item }}"
  loop:
    - "{{ frontend_otp_ui_folder }}/packages/endpoints-overlay"
    - "{{ frontend_otp_ui_folder }}/packages/itinerary-body"
    - "{{ frontend_otp_ui_folder }}/packages/location-field"
    - "{{ frontend_otp_ui_folder }}/packages/location-icon"
  notify:
    - Install otp-react-redux's dependencies

- name: Install otp-react-redux's dependencies
  community.general.yarn:
    path: "{{ frontend_otp_react_redux_folder }}"
  notify:
    - Compile otp-react-redux

- name: Compile otp-react-redux # noqa: no-changed-when
  ansible.builtin.command: "yarn build"
  environment:
    YAML_CONFIG: "{{ frontend_config_path }}"
  args:
    chdir: "{{ frontend_otp_react_redux_folder }}"
  notify:
    - Copy otp-react-redux to webroot

- name: Copy otp-react-redux to webroot
  ansible.builtin.copy:
    src: "{{ frontend_otp_react_redux_folder }}/dist/"
    dest: "{{ frontend_root }}"
    remote_src: true
    mode: "755"
  notify:
    - Restart nginx
